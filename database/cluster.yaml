apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-ha
  namespace: database
spec:
  instances: 3
  
  # Official CNPG image for PostgreSQL 16
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2

  # Bootstrap database configuration using our secret
  bootstrap:
    initdb:
      database: app_db
      owner: app_user
      secret:
        name: db-creds

  # Configure storage
  storage:
    size: 5Gi
    storageClass: do-block-storage

  # PostgreSQL configuration settings
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
      work_mem: "16MB"
      maintenance_work_mem: "128MB"
      min_wal_size: "1GB"
      max_wal_size: "2GB"
